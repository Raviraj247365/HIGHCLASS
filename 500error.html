<!--500error.html--><!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HIGHCLASS — Server Error (500)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen bg-black text-white">
    <main
      class="flex min-h-screen items-center justify-center bg-black px-4 text-white"
    >
      <div
        class="w-full max-w-xl rounded-2xl bg-gray-950/95 p-8 text-center shadow-2xl ring-1 ring-white/10"
      >
        <p
          class="text-xs uppercase tracking-[0.25em] text-red-400"
        >
          Server error
        </p>
        <h1
          class="mt-2 text-3xl font-bold tracking-tight sm:text-4xl"
        >
          Something went wrong
        </h1>
        <p
          class="mt-3 text-sm text-gray-400 sm:text-base"
        >
          Our HIGHCLASS servers hit an unexpected glitch. The team has
          been notified and is already on it.
        </p>

        <div
          class="mt-7 flex flex-col items-center gap-3 sm:flex-row sm:justify-center"
        >
          <button
            type="button"
            onclick="location.reload()"
            class="inline-flex w-full items-center justify-center rounded-full bg-red-600 px-6 py-2.5 text-sm font-semibold tracking-wide text-white shadow-sm transition hover:bg-red-700 sm:w-auto"
          >
            Try again
          </button>
          <a
            href="/"
            class="inline-flex w-full items-center justify-center rounded-full border border-white/20 bg-gray-900 px-6 py-2.5 text-sm font-semibold tracking-wide text-gray-100 transition hover:border-red-500 hover:text-red-400 sm:w-auto"
          >
            Go to homepage
          </a>
        </div>

        <p
          class="mt-4 text-[11px] text-gray-500"
        >
          If the issue continues, please visit our contact page and
          share what you were doing when this appeared.
        </p>
      </div>
    </main>
    <!-- put this BEFORE closing </body> in any page where you want 3D bg -->
<script type="module" src="/js/three-bg.js"></script>

  </body>
</html>
