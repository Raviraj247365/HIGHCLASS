<!-- orders.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HIGHCLASS — Order History</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Shared global styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="min-h-screen bg-black text-white">
    <!-- ==========================
         Global Site Header
    =========================== -->
    <header class="border-b border-white/10 bg-black/80 backdrop-blur">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3"
      >
        <!-- Brand logo / lockup -->
        <a href="index.html" class="flex items-center gap-2 group">
          <div
            class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-orange-500 to-red-600 text-xs font-bold text-white shadow-lg"
          >
            HC
          </div>

          <div class="flex items-baseline gap-2">
            <span
              class="hc-brand-main text-sm font-semibold uppercase tracking-[0.3em]"
            >
              HIGHCLASS
            </span>
            <span class="hc-brand-slash text-lg text-orange-500">/</span>
            <span
              class="hc-brand-sub text-[0.7rem] font-medium uppercase tracking-[0.25em] text-slate-400"
            >
              METAWEAR
            </span>
          </div>
        </a>

        <!-- Center: search bar -->
        <form class="relative hidden flex-1 max-w-sm md:block">
          <input
            type="search"
            placeholder="Search products…"
            class="w-full rounded-full border border-white/10 bg-white/5 px-9 py-1.5 text-xs text-white placeholder:text-slate-400 focus:border-orange-500 focus:outline-none"
          />
          <span
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs"
          >
            🔍
          </span>
        </form>

        <!-- Right side: navigation -->
        <nav class="flex items-center gap-3 text-[0.7rem] font-medium">
          <a href="index.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>
          <a href="sub-category.html" class="text-slate-300 hover:text-orange-400">
            Shop
          </a>
          <a href="category.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Categories
          </a>
          <a href="products.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Products
          </a>
          <a href="about.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            About
          </a>
          <a href="faq.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            FAQ
          </a>
          <a href="contact.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Contact
          </a>
          <a href="home.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>

          <!-- Cart & account -->
          <a href="cart.html" class="text-slate-300 hover:text-red-400">
            Cart
          </a>
          <a href="account.html" class="hidden text-slate-300 hover:text-red-400 md:inline">
            Account
          </a>

          <!-- Orders + payment (demo) -->
          <a
            href="orders.html"
            class="rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700"
          >
            Orders
          </a>
          <a
            href="payment.html"
            class="hidden rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700 md:inline"
          >
            Payment
          </a>

          <!-- Login CTA -->
          <a
            href="login.html"
            class="rounded-full bg-orange-500 px-4 py-1.5 text-[0.7rem] font-semibold uppercase tracking-[0.2em] text-black hover:bg-orange-400"
          >
            Login
          </a>
        </nav>
      </div>

      <!-- Mobile search bar -->
      <div class="border-t border-white/10 px-4 pb-3 pt-2 md:hidden">
        <form class="relative">
          <input
            type="search"
            placeholder="Search products…"
            class="w-full rounded-full border border-white/10 bg-white/5 px-9 py-2 text-xs text-white placeholder:text-slate-400 focus:border-orange-500 focus:outline-none"
          />
          <span
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs"
          >
            🔍
          </span>
        </form>
      </div>
    </header>

    <!-- ==========================
         Orders Content
    =========================== -->
    <main class="min-h-screen bg-black px-4 py-10 text-white">
      <div class="mx-auto max-w-4xl">
        <!-- Header -->
        <header class="mb-6 border-b border-white/10 pb-3">
          <h1 class="text-2xl font-bold md:text-3xl">
            Order history
          </h1>
          <p class="mt-1 text-xs text-gray-500">
            View your recent HIGHCLASS orders and track their status.
          </p>
        </header>

        <!-- Orders list (prototype uses static data) -->
        <div id="hc-orders-root" class="space-y-4"></div>
      </div>
    </main>

    <!-- Modal root -->
    <div id="hc-modal-root"></div>

    <script>
      const ORDERS = [
        {
          id: "HC1001",
          date: "2025-11-28",
          status: "Shipped",
          total: 7998,
          items: [
            {
              name: "Black VTO T‑Shirt",
              sku: "BT001",
              qty: 1,
              price: 4999,
            },
            {
              name: "HIGHCLASS Cap",
              sku: "CAP02",
              qty: 1,
              price: 2999,
            },
          ],
          shippingAddress: "123 Virtual Lane, Meta City, 90210",
        },
        {
          id: "HC1002",
          date: "2025-12-05",
          status: "Processing",
          total: 12000,
          items: [
            {
              name: "Blue VTO Hoodie",
              sku: "BH005",
              qty: 1,
              price: 12000,
            },
          ],
          shippingAddress: "123 Virtual Lane, Meta City, 90210",
        },
      ];

      function formatINR(value) {
        return value.toLocaleString("en-IN");
      }

      function getStatusClasses(status) {
        switch (status) {
          case "Shipped":
            return "bg-emerald-500/15 text-emerald-300 border border-emerald-500/40";
          case "Processing":
            return "bg-amber-500/15 text-amber-300 border border-amber-500/40";
          case "Cancelled":
            return "bg-red-500/15 text-red-300 border border-red-500/40";
          default:
            return "bg-gray-500/15 text-gray-300 border border-gray-500/40";
        }
      }

      const ordersRoot = document.getElementById("hc-orders-root");
      const modalRoot = document.getElementById("hc-modal-root");

      function closeModal() {
        modalRoot.innerHTML = "";
      }

      function openModalFromIndex(index) {
        const order = ORDERS[index];
        if (!order) return;

        const itemsHtml = order.items
          .map(
            (item) => `
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs text-gray-100">
                ${item.qty}× ${item.name}
              </p>
              <p class="text-[11px] text-gray-500">
                SKU: ${item.sku}
              </p>
            </div>
            <p class="text-xs font-semibold text-gray-100">
              ₹${formatINR(item.price)}
            </p>
          </div>
        `
          )
          .join("");

        modalRoot.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4">
          <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-2xl bg-gray-950/95 shadow-2xl ring-1 ring-white/10">
            <div class="flex items-start justify-between border-b border-white/10 px-6 py-4">
              <div>
                <h3 class="text-xl font-semibold text-white">
                  Order ${order.id}
                </h3>
                <p class="mt-1 text-xs text-gray-400">
                  Placed on ${new Date(order.date).toLocaleDateString("en-IN")}
                </p>
              </div>
              <button
                class="text-lg font-semibold text-gray-400 hover:text-white"
                onclick="closeModal()"
              >
                ×
              </button>
            </div>

            <div class="px-6 py-4">
              <span class="inline-flex items-center rounded-full border px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.16em] ${getStatusClasses(
                order.status
              )}">
                ${order.status}
              </span>

              <div class="mt-5">
                <h4 class="border-b border-white/10 pb-2 text-sm font-semibold text-gray-100">
                  Items purchased
                </h4>
                <div class="mt-2 space-y-2 text-xs">
                  ${itemsHtml}
                </div>
              </div>

              <div class="mt-5 border-t border-white/10 pt-4 text-sm">
                <div class="flex items-center justify-between">
                  <span class="text-gray-300">Total</span>
                  <span class="text-base font-semibold text-red-400">
                    ₹${formatINR(order.total)}
                  </span>
                </div>
                <p class="mt-3 text-xs text-gray-400">
                  <span class="font-medium text-gray-300">Shipping to:</span>
                  ${order.shippingAddress}
                </p>
                <button
                  class="mt-4 text-xs font-semibold text-red-400 hover:text-red-300"
                >
                  Track order (external link)
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
      }

      function renderOrders() {
        if (!ORDERS.length) {
          ordersRoot.innerHTML =
            '<div class="rounded-2xl bg-gray-950/80 p-8 text-center text-sm text-gray-400">You have not placed any orders yet. <a href="products.html" class="ml-1 font-semibold text-red-400 hover:text-red-300">Start shopping</a></div>';
          return;
        }

        ordersRoot.innerHTML = ORDERS.map(
          (order, index) => `
          <div class="flex flex-col gap-4 rounded-2xl bg-gray-950/90 p-4 shadow-lg ring-1 ring-white/5 transition hover:-translate-y-0.5 hover:ring-red-500/60 md:flex-row md:items-center md:justify-between">
            <div>
              <p class="text-sm font-semibold text-gray-50 md:text-base">
                Order ${order.id}
              </p>
              <p class="mt-1 text-[11px] text-gray-500">
                Placed on ${new Date(order.date).toLocaleDateString("en-IN")}
              </p>
            </div>
            <div class="flex flex-1 items-center justify-end gap-4">
              <div class="text-right">
                <span class="inline-flex items-center rounded-full border px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.16em] ${getStatusClasses(
                  order.status
                )}">
                  ${order.status}
                </span>
                <p class="mt-1 text-sm font-semibold text-red-400">
                  ₹${formatINR(order.total)}
                </p>
              </div>
              <button
                class="rounded-full bg-gray-900 px-4 py-2 text-xs font-semibold text-gray-100 transition hover:bg-red-600 hover:text-white"
                onclick="openModalFromIndex(${index})"
              >
                View details
              </button>
            </div>
          </div>
        `
        ).join("");
      }

      window.closeModal = closeModal;
      window.openModalFromIndex = openModalFromIndex;

      renderOrders();
    </script>

    <script type="module" src="js/three-bg.js"></script>
  </body>
</html>
