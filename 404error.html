<!--404.html--><!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HIGHCLASS — 404 Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen bg-black text-white">
    <main
      class="flex min-h-screen items-center justify-center bg-black px-4 text-white"
    >
      <div class="w-full max-w-xl text-center">
        <p
          class="text-xs uppercase tracking-[0.25em] text-gray-500"
        >
          Error
        </p>
        <h1
          class="mt-1 text-6xl font-bold tracking-[0.2em] text-red-500 sm:text-7xl"
        >
          404
        </h1>

        <h2
          class="mt-4 text-2xl font-semibold sm:text-3xl"
        >
          Page not found
        </h2>
        <p
          class="mt-3 text-sm text-gray-400 sm:text-base"
        >
          This page does not exist in the HIGHCLASS universe. It may
          have moved, or the link might be a little off‑fit.
        </p>

        <div
          class="mt-8 flex flex-col items-center gap-3 sm:flex-row sm:justify-center"
        >
          <a
            href="/"
            class="inline-flex w-full items-center justify-center rounded-full bg-red-600 px-6 py-2.5 text-sm font-semibold tracking-wide text-white shadow-sm transition hover:bg-red-700 sm:w-auto"
          >
            Go to homepage
          </a>
          <a
            href="/contact"
            class="inline-flex w-full items-center justify-center rounded-full border border-white/20 bg-gray-950 px-6 py-2.5 text-sm font-semibold tracking-wide text-gray-100 transition hover:border-red-500 hover:text-red-400 sm:w-auto"
          >
            Contact support
          </a>
        </div>

        <p
          class="mt-6 text-[11px] text-gray-500"
        >
          If you typed the address manually, double‑check the spelling
          or use the main navigation to find your way back.
        </p>
      </div>
    </main>
    <!-- put this BEFORE closing </body> in any page where you want 3D bg -->
<script type="module" src="/js/three-bg.js"></script>

  </body>
</html>
