<!-- search.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HIGHCLASS — Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CDN for prototype -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="min-h-screen bg-black text-white">
    <!-- ==========================
         Global Site Header
    =========================== -->
    <header class="border-b border-white/10 bg-black/80 backdrop-blur">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3"
      >
        <!-- Brand logo / lockup -->
        <a href="index.html" class="flex items-center gap-2 group">
          <div
            class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-orange-500 to-red-600 text-xs font-bold text-white shadow-lg"
          >
            HC
          </div>

          <div class="flex items-baseline gap-2">
            <span
              class="hc-brand-main text-sm font-semibold uppercase tracking-[0.3em]"
            >
              HIGHCLASS
            </span>
            <span class="hc-brand-slash text-lg text-orange-500">/</span>
            <span
              class="hc-brand-sub text-[0.7rem] font-medium uppercase tracking-[0.25em] text-slate-400"
            >
              METAWEAR
            </span>
          </div>
        </a>

        <!-- Center: header search (for consistency) -->
        <form class="relative hidden flex-1 max-w-sm md:block" role="search">
          <input
            type="search"
            aria-label="Search products"
            placeholder="Search products…"
            class="w-full rounded-full border border-white/10 bg-white/5 px-9 py-1.5 text-xs text-white placeholder:text-slate-400 focus:border-orange-500 focus:outline-none"
          />
          <span
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs"
          >
            🔍
          </span>
        </form>

        <!-- Right side: navigation -->
        <nav class="flex items-center gap-3 text-[0.7rem] font-medium">
          <a href="index.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>
          <a href="sub-category.html" class="text-slate-300 hover:text-orange-400">
            Shop
          </a>
          <a href="category.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Categories
          </a>
          <a href="products.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Products
          </a>
          <a href="about.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            About
          </a>
          <a href="faq.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            FAQ
          </a>
          <a href="contact.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Contact
          </a>
          <a href="home.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>

          <!-- Cart & account -->
          <a href="cart.html" class="text-slate-300 hover:text-red-400">
            Cart
          </a>
          <a href="account.html" class="hidden text-slate-300 hover:text-red-400 md:inline">
            Account
          </a>

          <!-- Orders + payment (demo) -->
          <a
            href="orders.html"
            class="hidden rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700 md:inline"
          >
            Orders
          </a>
          <a
            href="payment.html"
            class="hidden rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700 md:inline"
          >
            Payment
          </a>

          <!-- Login CTA -->
          <a
            href="login.html"
            class="rounded-full bg-orange-500 px-4 py-1.5 text-[0.7rem] font-semibold uppercase tracking-[0.2em] text-black hover:bg-orange-400"
          >
            Login
          </a>
        </nav>
      </div>
    </header>

    <!-- ==========================
         Search Content
    =========================== -->
    <main class="px-4 py-12">
      <div class="mx-auto max-w-5xl">
        <!-- Heading -->
        <header class="mb-8 text-center">
          <p
            class="text-xs uppercase tracking-[0.25em] text-gray-500"
          >
            Search
          </p>
          <h1 class="mt-1 text-3xl font-bold md:text-4xl">
            Find your next HIGHCLASS fit
          </h1>
          <p class="mt-2 text-sm text-gray-400">
            Search by product name, color, or category.
          </p>
        </header>

        <!-- Search Bar (primary) -->
        <form
          class="mb-10 flex flex-col gap-3 sm:flex-row"
          role="search"
          onsubmit="event.preventDefault(); renderResults(input.value);"
        >
          <div class="relative flex-1">
            <span
              class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-gray-500"
            >
              🔍
            </span>
            <input
              id="hc-search-input"
              type="search"
              aria-label="Search HIGHCLASS products"
              placeholder='Search for products, e.g. "hoodie", "oversized tee"...'
              class="w-full rounded-full border border-white/10 bg-gray-950 py-3 pl-10 pr-4 text-sm text-gray-100 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500"
            />
          </div>
          <button
            id="hc-search-btn"
            type="button"
            class="rounded-full bg-red-600 px-8 py-3 text-sm font-semibold tracking-wide transition hover:bg-red-700"
          >
            Search
          </button>
        </form>

        <!-- Results Header -->
        <div class="mb-6 flex items-center justify-between">
          <h2
            id="hc-results-title"
            class="text-xl font-semibold"
          >
            Popular searches
          </h2>
          <p
            id="hc-results-count"
            class="hidden text-xs text-gray-500"
          ></p>
        </div>

        <!-- Results / Empty State -->
        <div id="hc-results-root">
          <div
            class="mt-4 rounded-2xl border border-dashed border-white/10 bg-gray-950/60 p-8 text-center"
          >
            <p class="text-sm text-gray-400">
              Start typing above to search the HIGHCLASS collection.
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- ==========================
         Front-end search logic (demo)
    =========================== -->
    <script>
      const input = document.getElementById("hc-search-input");
      const btn = document.getElementById("hc-search-btn");
      const root = document.getElementById("hc-results-root");
      const title = document.getElementById("hc-results-title");
      const count = document.getElementById("hc-results-count");

      function renderResults(query) {
        const trimmed = query.trim();
        if (!trimmed) {
          title.textContent = "Popular searches";
          count.classList.add("hidden");
          root.innerHTML =
            '<div class="mt-4 rounded-2xl border border-dashed border-white/10 bg-gray-950/60 p-8 text-center"><p class="text-sm text-gray-400">Start typing above to search the HIGHCLASS collection.</p></div>';
          return;
        }

        // Dummy static results (prototype)
        const results = [
          {
            id: 1,
            name: "Classic Red Shirt",
            price: "₹999",
            img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=900&q=80",
          },
          {
            id: 2,
            name: "Premium Black T‑Shirt",
            price: "₹1,199",
            img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80",
          },
        ];

        title.innerHTML =
          'Results for <span class="text-red-400">“' +
          trimmed +
          '”</span>';
        count.textContent =
          results.length +
          " item" +
          (results.length !== 1 ? "s" : "") +
          " found";
        count.classList.remove("hidden");

        if (!results.length) {
          root.innerHTML =
            '<div class="mt-4 rounded-2xl border border-dashed border-white/10 bg-gray-950/60 p-8 text-center"><p class="text-sm text-gray-400">No results found. Try a different keyword like “hoodie”, “denim”, or “tee”.</p></div>';
          return;
        }

        root.innerHTML =
          '<div class="grid grid-cols-1 gap-8 sm:grid-cols-2 md:grid-cols-3">' +
          results
            .map(
              (item) =>
                `<article class="group flex cursor-pointer flex-col overflow-hidden rounded-2xl bg-gray-950 shadow-lg ring-1 ring-white/5 transition hover:-translate-y-1 hover:shadow-2xl">
                  <div class="relative h-56 overflow-hidden">
                    <img src="${item.img}" alt="${item.name}" class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105" />
                    <span class="absolute left-3 top-3 rounded-full bg-black/70 px-3 py-1 text-[11px] font-medium uppercase tracking-[0.18em] text-gray-100">
                      Match
                    </span>
                  </div>
                  <div class="flex flex-1 flex-col p-4">
                    <h3 class="text-sm font-semibold md:text-base">${item.name}</h3>
                    <p class="mt-1 text-xs text-gray-400">HIGHCLASS · Premium collection</p>
                    <div class="mt-3 flex items-center justify-between">
                      <p class="text-base font-bold text-red-500">${item.price}</p>
                      <span class="text-[11px] uppercase tracking-[0.18em] text-gray-500">In stock</span>
                    </div>
                    <a href="product.html" class="mt-4 w-full rounded-lg bg-red-600 py-2 text-center text-sm font-semibold transition hover:bg-red-700">
                      View product
                    </a>
                  </div>
                </article>`
            )
            .join("") +
          "</div>";
      }

      btn.addEventListener("click", () => {
        renderResults(input.value);
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          renderResults(input.value);
        }
      });
    </script>

    <script type="module" src="js/three-bg.js"></script>
  </body>
</html>
