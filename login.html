<!-- login.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HIGHCLASS — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind CDN for prototype -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Shared global styles -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <!-- Dark theme shell -->
  <body class="min-h-screen bg-black text-white">
    <!-- ==========================
         Global Site Header
         (same across all pages)
    =========================== -->
    <header class="border-b border-white/10 bg-black/80 backdrop-blur">
      <div
        class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3"
      >
        <!-- Brand logo / lockup -->
        <a href="index.html" class="flex items-center gap-2 group">
          <div
            class="flex h-8 w-8 items-center justify-center rounded-full bg-gradient-to-br from-orange-500 to-red-600 text-xs font-bold text-white shadow-lg"
          >
            HC
          </div>

          <div class="flex items-baseline gap-2">
            <span
              class="hc-brand-main text-sm font-semibold uppercase tracking-[0.3em]"
            >
              HIGHCLASS
            </span>
            <span class="hc-brand-slash text-lg text-orange-500">/</span>
            <span
              class="hc-brand-sub text-[0.7rem] font-medium uppercase tracking-[0.25em] text-slate-400"
            >
              METAWEAR
            </span>
          </div>
        </a>

        <!-- Center: search bar (prototype only) -->
        <form class="relative hidden flex-1 max-w-sm md:block">
          <input
            type="search"
            placeholder="Search products…"
            class="w-full rounded-full border border-white/10 bg-white/5 px-9 py-1.5 text-xs text-white placeholder:text-slate-400 focus:border-orange-500 focus:outline-none"
          />
          <span
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs"
          >
            🔍
          </span>
        </form>

        <!-- Right side: nav -->
        <nav class="flex items-center gap-3 text-[0.7rem] font-medium">
          <a href="index.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>
          <a href="sub-category.html" class="text-slate-300 hover:text-orange-400">
            Shop
          </a>
          <a href="category.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Categories
          </a>
          <a href="products.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Products
          </a>
          <a href="about.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            About
          </a>
          <a href="faq.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            FAQ
          </a>
          <a href="contact.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Contact
          </a>
          <a href="home.html" class="hidden text-slate-300 hover:text-orange-400 md:inline">
            Home
          </a>

          <!-- Cart & account -->
          <a href="cart.html" class="text-slate-300 hover:text-red-400">
            Cart
          </a>
          <a href="account.html" class="hidden text-slate-300 hover:text-red-400 md:inline">
            Account
          </a>

          <!-- Orders + payment (demo) -->
          <a
            href="orders.html"
            class="hidden rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700 md:inline"
          >
            Orders
          </a>
          <a
            href="payment.html"
            class="hidden rounded-full bg-red-600 px-3 py-1 text-[0.65rem] font-semibold text-white hover:bg-red-700 md:inline"
          >
            Payment
          </a>

          <!-- Login CTA (current page) -->
          <a
            href="login.html"
            class="rounded-full bg-orange-500 px-4 py-1.5 text-[0.7rem] font-semibold uppercase tracking-[0.2em] text-black hover:bg-orange-400"
          >
            Login
          </a>
        </nav>
      </div>

      <!-- Mobile search bar -->
      <div class="border-t border-white/10 px-4 pb-3 pt-2 md:hidden">
        <form class="relative">
          <input
            type="search"
            placeholder="Search products…"
            class="w-full rounded-full border border-white/10 bg-white/5 px-9 py-2 text-xs text-white placeholder:text-slate-400 focus:border-orange-500 focus:outline-none"
          />
          <span
            class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-xs"
          >
            🔍
          </span>
        </form>
      </div>
    </header>

    <!-- ==========================
         Main Login Content
         Simple prototype auth card
    =========================== -->
    <main class="flex min-h-screen items-center justify-center px-4 text-white">
      <div
        class="w-full max-w-md rounded-2xl bg-gray-950/90 p-8 shadow-2xl ring-1 ring-white/5"
      >
        <!-- Card header -->
        <div class="mb-6 text-center">
          <p
            class="text-xs uppercase tracking-[0.25em] text-gray-500"
          >
            Welcome back
          </p>
          <h2 class="mt-1 text-2xl font-bold tracking-[0.15em]">
            Sign in to
            <span class="text-red-500">HIGHCLASS</span>
          </h2>
          <p class="mt-2 text-xs text-gray-500">
            Access your orders, saved fits, and 3D try‑on history.
          </p>
        </div>

        <!-- Login form (front-end validation + fake success) -->
        <form id="hc-login-form" class="space-y-4">
          <!-- Email -->
          <div>
            <label
              for="email"
              class="mb-1 block text-xs font-medium uppercase tracking-[0.18em] text-gray-400"
            >
              Email address
            </label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
              class="mt-1 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-gray-100 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="mb-1 block text-xs font-medium uppercase tracking-[0.18em] text-gray-400"
            >
              Password
            </label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
              placeholder="Enter your password"
              class="mt-1 block w-full rounded-lg border border-white/10 bg-gray-900 px-3 py-2 text-sm text-gray-100 placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500"
            />
            <div class="mt-1 text-right">
              <a
                href="#"
                class="text-xs font-medium text-gray-400 hover:text-red-400"
              >
                Forgot password?
              </a>
            </div>
          </div>

          <!-- Error box (shown only when validation fails) -->
          <div
            id="hc-login-error"
            class="hidden flex items-start gap-2 rounded-lg border border-red-500/40 bg-red-950/40 px-3 py-2 text-xs text-red-200"
          >
            <span class="mt-[2px] text-sm">!</span>
            <p id="hc-login-error-text"></p>
          </div>

          <!-- Submit button -->
          <button
            id="hc-login-btn"
            type="submit"
            class="flex w-full justify-center rounded-full bg-red-600 py-2.5 text-sm font-semibold tracking-wide text-white transition hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 focus:ring-offset-black"
          >
            Log in
          </button>
        </form>

        <!-- Card footer: link to registration -->
        <div class="mt-4 text-center text-xs text-gray-400">
          <span>New to HIGHCLASS? </span>
          <a
            href="register.html"
            class="font-semibold text-red-400 hover:text-red-300"
          >
            Create an account
          </a>
        </div>
      </div>
    </main>

    <!-- Simple front-end login simulation for prototype -->
    <script>
      const form = document.getElementById("hc-login-form");
      const btn = document.getElementById("hc-login-btn");
      const errBox = document.getElementById("hc-login-error");
      const errText = document.getElementById("hc-login-error-text");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        // Reset error state
        errBox.classList.add("hidden");
        errText.textContent = "";

        if (!email || !password) {
          errText.textContent = "Please enter both email and password.";
          errBox.classList.remove("hidden");
          return;
        }

        // Simulate loading state
        btn.textContent = "Signing you in…";
        btn.disabled = true;
        btn.classList.add("bg-red-400", "cursor-not-allowed");
        btn.classList.remove("hover:bg-red-700");

        // Prototype: fake success after delay
        setTimeout(() => {
          alert("Login successful! (Prototype only)");
          btn.textContent = "Log in";
          btn.disabled = false;
          btn.classList.remove("bg-red-400", "cursor-not-allowed");
          btn.classList.add("hover:bg-red-700");
        }, 1200);
      });
    </script>

    <!-- Optional background / 3D layer -->
    <script type="module" src="js/three-bg.js"></script>
  </body>
</html>
